homematic_hcu: hcu1-E461.local
homematic_token:
ssl_cert_path:
ssl_verify: false
plugin_id:
friendly_name:
  en: "Homematic HTTP Bridge"
  de: "Homematic HTTP Bridge"

# Loxone UDP Push (optional)
# Wenn miniserver_ip gesetzt ist, werden HmIP-State-Änderungen per UDP an den Miniserver gesendet.
# Variablennamen: hmip_<DEVICE_ID>_ch<N>_on / _dimLevel / _hue / ...
# In Loxone Config: Virtueller Eingang mit passendem UDP-Variablennamen anlegen.
loxone:
  miniserver_ip: # z.B. 192.168.1.100 (leer lassen = deaktiviert)
  udp_port: 7777

# Shelly Netzwerk-Scanner (optional)
# Wenn enabled: true, erscheint unter /shelly eine Übersicht aller Shelly-Geräte im Netz.
# subnet: Das zu scannende Netzwerk (CIDR-Notation).
# timeout_sec: Timeout pro IP beim Sweep (kleiner = schneller, aber mehr Fehlalarme).
shelly:
  enabled: false
  subnet: "192.168.1.0/24"
  timeout_sec: 1.5

# HTTP-API Auth:
api_key: # optional: Key hier eintragen (oder leer lassen)
require_api_key: true
api_key_file: data/api_key.txt # Fallback-Datei; wird bei Bedarf automatisch erzeugt
