{% extends "base.html" %}
{% block title %}Login – Homematic Bridge{% endblock %}

{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">&#9889; Homematic <em>Bridge</em></div>
    {% if error %}
      <div class="login-error">Falsches Passwort. Bitte erneut versuchen.</div>
    {% endif %}
    <form method="POST" action="/login?next={{ next_url | e }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="login-field">
        <label>Passwort (API-Key)</label>
        <input type="password" name="password" autofocus autocomplete="current-password" placeholder="API-Key eingeben">
      </div>
      <button class="login-btn" type="submit">Anmelden</button>
    </form>
  </div>
</div>
{% endblock %}
